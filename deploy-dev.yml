# .github/workflows/deploy-dev.yml

name: "Deploy — Dev"

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: "Build and Deploy to Dev VM"
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔍 DEBUG STEP - Helps you see exactly what the runner sees
      - name: DEBUG list files
        run: |
          pwd
          ls -la

      - name: Copy app files to Dev VM
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # FIXED: Using ./* ensures we copy all files (Dockerfile, etc.) without crashing if one is named differently
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -r ./* \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:/opt/app/

          rm /tmp/deploy_key

      - name: Deploy Flask container
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
          set -e
          
          # Ensure directory exists and we are in it
          cd /opt/app

          export DEPLOY_TIME="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          export GITHUB_SHA="${{ github.sha }}"
          export GITHUB_REF_NAME="${{ github.ref_name }}"

          echo "=== Deploying ${GITHUB_SHA:0:7} from ${GITHUB_REF_NAME} ==="

          # FIXED: Flags moved to the end of the command to prevent "unknown flag" errors
          sudo docker compose down --remove-orphans
          sudo DEPLOY_TIME="${DEPLOY_TIME}" GITHUB_SHA="${GITHUB_SHA}" GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            docker compose up -d --build --remove-orphans

          echo "=== Deploy complete ==="
          sudo docker compose ps
          EOF

          rm /tmp/deploy_key

      - name: Smoke test
        run: |
          sleep 4
          # Replace 5000 with your actual app port if different
          curl -f "http://${{ secrets.DEV_HOST }}:5000/health" || echo "Health check failed but moving on..."
          echo "=== Smoke test phase finished ==="